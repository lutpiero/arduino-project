name: Build Arduino Firmware

on:
  push:
    branches:
      - deploy

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Platform Core
        # Installs the standard Arduino AVR core. 
        # If you are compiling for your home automation or robotics projects utilizing the ESP32-C3, 
        # you would add: arduino-cli core install esp32:esp32
        run: arduino-cli core install arduino:avr

      - name: Compile All Sketches
        run: |
          for sketch in sketch/*; do
            if [ -d "$sketch" ]; then
              echo "Compiling $sketch"
              arduino-cli compile --fqbn arduino:avr:uno --export-binaries "$sketch"
            fi
          done
        
      - name: Upload Hex Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-arduino-hex
          # Grabs all generated hex files from each sketch build folder.
          path: sketch/*/build/arduino.avr.uno/*.hex
          if-no-files-found: error